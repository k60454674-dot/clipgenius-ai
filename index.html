<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClipGenius AI</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#07111f;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
width:100%;
max-width:700px;
text-align:center;
}

h1{
font-size:42px;
margin-bottom:15px;
}

p{
color:#b8c5d6;
margin-bottom:25px;
}

input{
width:100%;
padding:15px;
font-size:16px;
border:none;
border-radius:10px;
margin-bottom:20px;
}

button{
width:100%;
padding:15px;
font-size:18px;
background:#2563eb;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

#status{
margin-top:20px;
font-weight:bold;
color:#38bdf8;
}

.features{
margin-top:40px;
display:grid;
gap:15px;
}

.card{
background:#13243a;
padding:20px;
border-radius:12px;
}

.footer{
margin-top:40px;
font-size:14px;
color:#94a3b8;
}
</style>
</head>

<body>

<div class="container">

<h1>🎬 ClipGenius AI</h1>

<p>Create viral TikTok, YouTube Shorts and Instagram Reels with AI.</p>

<input
id="videoLink"
type="text"
placeholder="Paste YouTube, TikTok, Facebook or Instagram link">

<button onclick="generateClip()">Generate Clips</button>

<p id="status"></p>

<div class="features">

<div class="card">
<h2>⚡ AI Auto Clip</h2>
<p>Automatically finds the best moments.</p>
</div>

<div class="card">
<h2>🎯 Viral Captions</h2>
<p>Generate subtitles automatically.</p>
</div>

<div class="card">
<h2>📥 HD Download</h2>
<p>Download clips in HD quality.</p>
</div>

</div>

<div class="footer">
© 2026 ClipGenius AI
</div>

</div>

<script>
function generateClip(){

const link=document.getElementById("videoLink").value;
const status=document.getElementById("status");

if(link===""){
status.innerHTML="❌ Please paste a video link first.";
return;
}

status.innerHTML="🤖 AI is analyzing your video...";

setTimeout(function(){

status.innerHTML="✅ Demo Complete! ClipGenius AI successfully detected your video. Real AI clipping will be added in the next version.";

},3000);

}
</script>

</body>
</html>
