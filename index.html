<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClipGenius AI</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
padding-top:60px;
}

h1{
font-size:42px;
margin-bottom:10px;
}

p{
color:#cbd5e1;
margin-bottom:30px;
}

input{
width:100%;
padding:15px;
font-size:16px;
border:none;
border-radius:10px;
margin-bottom:20px;
}

button{
padding:15px 35px;
font-size:18px;
background:#2563eb;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.features{
display:grid;
grid-template-columns:1fr;
gap:15px;
margin-top:50px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:12px;
}

.footer{
margin-top:60px;
font-size:14px;
color:#94a3b8;
}
</style>

</head>
<script>

function generateClip() {

const link = document.querySelector("input").value;
const status = document.getElementById("status");

if(link === ""){
    status.innerHTML = "❌ Please paste a video link first.";
    return;
}

status.innerHTML = "🤖 AI is analyzing your video...";

setTimeout(function(){

status.innerHTML = "✅ Demo complete! Soon ClipGenius AI will automatically create viral clips from your video.";

},3000);

}

}
</script>
<body>

<div class="container">

<h1>🎬 ClipGenius AI</h1>

<p>Create viral TikTok, YouTube Shorts and Instagram Reels with AI.</p>

<input
type="text"
placeholder="Paste YouTube, Facebook or TikTok link here">

<br>

<button onclick="generateClip()">Generate Clips</button>
<p id="status" style="margin-top:20px;color:#38bdf8;font-weight:bold;"></p>
    
<div class="features">

<div class="card">
<h2>⚡ AI Auto Clip</h2>
<p>Automatically finds the best moments.</p>
</div>

<div class="card">
<h2>🎯 Viral Captions</h2>
<p>Generate subtitles and captions automatically.</p>
</div>

<div class="card">
<h2>📥 Download HD</h2>
<p>Download your finished clips in high quality.</p>
</div>

</div>

<div class="footer">
© 2026 ClipGenius AI
</div>

</div>

</body>
</html>
