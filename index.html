<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClipGenius AI</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
padding-top:50px;
text-align:center;
}

h1{
font-size:40px;
margin-bottom:15px;
}

.subtitle{
color:#cbd5e1;
margin-bottom:30px;
}

input{
width:100%;
padding:15px;
border:none;
border-radius:10px;
font-size:16px;
margin-bottom:20px;
}

button{
width:100%;
padding:15px;
background:#2563eb;
color:white;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

#status{
margin-top:20px;
font-weight:bold;
color:#38bdf8;
}
</style>
</head>

<body>

<div class="container">

<h1>🎬 ClipGenius AI</h1>

<p class="subtitle">
Turn long videos into viral short clips with AI.
</p>

<input
id="videoLink"
type="text"
placeholder="Paste YouTube, TikTok, Facebook or Instagram link">

<button onclick="generateClip()">🚀 Generate Clips</button>

<p id="status"></p>
<div style="margin-top:40px;background:#1e293b;padding:20px;border-radius:12px;">
<h2>⚡ AI Auto Clip</h2>
<p>Automatically finds the best moments in your video.</p>
</div>

<div style="margin-top:20px;background:#1e293b;padding:20px;border-radius:12px;">
<h2>🎯 Viral Captions</h2>
<p>Generate subtitles and captions automatically.</p>
</div>

<div style="margin-top:20px;background:#1e293b;padding:20px;border-radius:12px;">
<h2>📥 HD Download</h2>
<p>Download your clips in high quality.</p>
</div>

<p style="margin-top:40px;color:#94a3b8;">
© 2026 ClipGenius AI
</p>

</div>

<script>
function generateClip(){

const link = document.getElementById("videoLink").value;
const status = document.getElementById("status");

if(link === ""){
    status.innerHTML = "❌ Please paste a video link first.";
    return;
}

status.innerHTML = "🤖 Connecting to AI server...";

setTimeout(function(){

status.innerHTML = "✅ Success! Your video has been received. In the next stage, ClipGenius AI will process and create short clips automatically.";

},3000);

}
</script>

</body>
</html>
